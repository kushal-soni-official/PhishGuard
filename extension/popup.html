<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 250px; font-family: Arial, sans-serif; padding: 10px; background-color: #121212; color: #e0e0e0; }
    h3 { color: #bb86fc; margin-top: 0; }
    label { display: block; margin-bottom: 5px; font-size: 12px; }
    input { width: 100%; box-sizing: border-box; padding: 5px; margin-bottom: 10px; background: #333; border: 1px solid #555; color: white; }
    button { width: 100%; padding: 8px; background: #bb86fc; color: black; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
    button:hover { background: #9b59b6; }
    #status { margin-top: 10px; font-size: 12px; color: #03dac6; }
  </style>
</head>
<body>
  <h3><img src="icons/icon16.png" style="vertical-align: middle"> PhishGuard Settings</h3>
  <label for="apiUrl">Backend API URL:</label>
  <input type="text" id="apiUrl" placeholder="http://localhost:5000">
  <button id="saveBtn">Save</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
